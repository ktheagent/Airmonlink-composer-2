name: Validate and Build Windows Release

"on":
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  windows:
    name: Validate and build Windows x64
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"

      - name: Pin npm and clear production-only configuration
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force validation | Out-Null

          Remove-Item Env:NODE_ENV -ErrorAction SilentlyContinue
          Remove-Item Env:NPM_CONFIG_PRODUCTION -ErrorAction SilentlyContinue
          Remove-Item Env:NPM_CONFIG_OMIT -ErrorAction SilentlyContinue

          npm install --global npm@10.8.0 --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          npm config delete production --location=user
          npm config delete omit --location=user

          $nodeVersion = (node --version).Trim()
          $npmVersion = (npm --version).Trim()

          if ($nodeVersion -ne "v22.22.2") {
            throw "Expected Node v22.22.2 but found $nodeVersion."
          }
          if ($npmVersion -ne "10.8.0") {
            throw "Expected npm 10.8.0 but found $npmVersion."
          }

          "node=$nodeVersion" | Tee-Object -FilePath validation/toolchain.log
          "npm=$npmVersion" | Tee-Object -FilePath validation/toolchain.log -Append
          "production=$(npm config get production)" | Tee-Object -FilePath validation/toolchain.log -Append
          "omit=$(npm config get omit)" | Tee-Object -FilePath validation/toolchain.log -Append

      - name: Install locked dependencies including build tools
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          Remove-Item node_modules -Recurse -Force -ErrorAction SilentlyContinue

          cmd.exe /d /s /c "npm ci --include=dev --no-audit --no-fund > validation\npm-ci.log 2>&1"
          $installExitCode = $LASTEXITCODE
          Get-Content validation/npm-ci.log

          if ($installExitCode -ne 0) {
            throw "npm ci failed with exit code $installExitCode."
          }

          $builder = Join-Path $PWD "node_modules\electron-builder\cli.js"
          $shim = Join-Path $PWD "node_modules\.bin\electron-builder.cmd"

          foreach ($path in @($builder, $shim)) {
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "Required build tool is missing after npm ci: $path"
            }
          }

          node $builder --version
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Lint source
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          cmd.exe /d /s /c "npm run lint > validation\lint.log 2>&1"
          $commandExitCode = $LASTEXITCODE
          Get-Content validation/lint.log
          if ($commandExitCode -ne 0) {
            throw "Lint failed with exit code $commandExitCode."
          }

      - name: Run automated tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          cmd.exe /d /s /c "npm test > validation\tests.log 2>&1"
          $commandExitCode = $LASTEXITCODE
          Get-Content validation/tests.log
          if ($commandExitCode -ne 0) {
            throw "Tests failed with exit code $commandExitCode."
          }

          $text = Get-Content validation/tests.log -Raw
          $tests = [regex]::Match($text, '(?m)^# tests\s+(\d+)\s*$')
          $passed = [regex]::Match($text, '(?m)^# pass\s+(\d+)\s*$')
          $failed = [regex]::Match($text, '(?m)^# fail\s+(\d+)\s*$')

          if (-not $tests.Success -or -not $passed.Success -or -not $failed.Success) {
            throw "Could not prove the Node test totals from TAP output."
          }
          if ([int]$tests.Groups[1].Value -lt 141 -or
              [int]$passed.Groups[1].Value -ne [int]$tests.Groups[1].Value -or
              [int]$failed.Groups[1].Value -ne 0) {
            throw "Expected at least 141 passing tests and zero failures."
          }

      - name: Build Windows x64 NSIS and portable executables
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"

          $builder = Join-Path $PWD "node_modules\electron-builder\cli.js"
          if (-not (Test-Path $builder -PathType Leaf)) {
            throw "electron-builder is missing before packaging: $builder"
          }

          cmd.exe /d /s /c "npm run dist:win > validation\windows-build.log 2>&1"
          $commandExitCode = $LASTEXITCODE
          Get-Content validation/windows-build.log
          if ($commandExitCode -ne 0) {
            throw "Windows packaging failed with exit code $commandExitCode."
          }

      - name: Validate PE metadata, install, launch, association, and uninstall
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          try {
            & ./scripts/windows-release-validation.ps1 *>&1 |
              Tee-Object -FilePath validation/windows-validation.log
          } catch {
            if (Test-Path validation/windows-validation.log) {
              Get-Content validation/windows-validation.log
            }
            throw
          }

      - name: Detect generated distributables
        if: always()
        id: distributables
        shell: pwsh
        run: |
          $installer = Test-Path "release/Airmonlink-Composer-1.1.0-Build14-Setup.exe" -PathType Leaf
          $portable = Test-Path "release/Airmonlink-Composer-1.1.0-Build14-Portable.exe" -PathType Leaf
          $checksums = Test-Path "release/SHA256SUMS.txt" -PathType Leaf
          "present=$($installer -and $portable -and $checksums)".ToLowerInvariant() |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Windows distributables
        if: ${{ always() && steps.distributables.outputs.present == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Airmonlink-Composer-1.1.0-Build14-Windows
          path: |
            release/Airmonlink-Composer-1.1.0-Build14-Setup.exe
            release/Airmonlink-Composer-1.1.0-Build14-Portable.exe
            release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Airmonlink-Composer-1.1.0-Build14-Windows-Validation
          path: validation/**
          if-no-files-found: warn
          retention-days: 30
