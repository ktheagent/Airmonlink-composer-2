name: Validate and Build Windows Release

"on":
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  windows:
    name: Validate and build Windows x64
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      NPM_CONFIG_CACHE: ${{ github.workspace }}\.npm-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"

      - name: Install locked dependencies without lifecycle scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force validation | Out-Null
          Remove-Item node_modules -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $env:NPM_CONFIG_CACHE -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item Env:NODE_ENV -ErrorAction SilentlyContinue
          Remove-Item Env:NPM_CONFIG_PRODUCTION -ErrorAction SilentlyContinue
          Remove-Item Env:NPM_CONFIG_OMIT -ErrorAction SilentlyContinue

          node --version | Tee-Object validation/toolchain.log
          npm --version | Tee-Object validation/toolchain.log -Append

          cmd.exe /d /s /c "npm ci --include=dev --ignore-scripts --no-audit --no-fund > validation\npm-ci.log 2>&1"
          $npmExit = $LASTEXITCODE
          Get-Content validation/npm-ci.log

          if ($npmExit -ne 0) {
            $log = Get-Content validation/npm-ci.log -Raw
            if ($log -notmatch "Exit handler never called") {
              throw "npm ci failed with exit code $npmExit."
            }

            Write-Host "npm CLI hit its internal exit-handler defect; using a lockfile-derived pnpm install."
            Remove-Item node_modules -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item pnpm-lock.yaml -Force -ErrorAction SilentlyContinue
            corepack enable
            corepack prepare pnpm@10.14.0 --activate
            pnpm import
            if ($LASTEXITCODE -ne 0) {
              throw "pnpm could not import package-lock.json."
            }
            pnpm install --frozen-lockfile --ignore-scripts
            if ($LASTEXITCODE -ne 0) {
              throw "pnpm fallback install failed."
            }
          }

          $builder = Join-Path $PWD "node_modules\electron-builder\cli.js"
          $electronInstall = Join-Path $PWD "node_modules\electron\install.js"
          foreach ($required in @($builder, $electronInstall)) {
            if (-not (Test-Path $required -PathType Leaf)) {
              throw "Required locked dependency is missing: $required"
            }
          }

          $lock = Get-Content package-lock.json -Raw | ConvertFrom-Json
          $expectedBuilder = $lock.packages.'node_modules/electron-builder'.version
          $expectedElectron = $lock.packages.'node_modules/electron'.version
          $actualBuilder = (Get-Content node_modules/electron-builder/package.json -Raw | ConvertFrom-Json).version
          $actualElectron = (Get-Content node_modules/electron/package.json -Raw | ConvertFrom-Json).version

          if ($actualBuilder -ne $expectedBuilder) {
            throw "electron-builder version mismatch: expected $expectedBuilder, found $actualBuilder."
          }
          if ($actualElectron -ne $expectedElectron) {
            throw "Electron version mismatch: expected $expectedElectron, found $actualElectron."
          }

          "electron-builder=$actualBuilder" | Tee-Object validation/dependency-versions.log
          "electron=$actualElectron" | Tee-Object validation/dependency-versions.log -Append
          node $builder --version

      - name: Install the locked Electron runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $electronInstall = Join-Path $PWD "node_modules\electron\install.js"
          node $electronInstall *>&1 | Tee-Object validation/electron-install.log
          if ($LASTEXITCODE -ne 0) {
            throw "Electron runtime installation failed with exit code $LASTEXITCODE."
          }

          $electronExe = Join-Path $PWD "node_modules\electron\dist\electron.exe"
          if (-not (Test-Path $electronExe -PathType Leaf)) {
            throw "Electron runtime was not installed: $electronExe"
          }

      - name: Lint source
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          node scripts/lint.js *>&1 | Tee-Object validation/lint.log
          if ($LASTEXITCODE -ne 0) {
            throw "Lint failed with exit code $LASTEXITCODE."
          }

      - name: Run automated tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $testFiles = Get-ChildItem test -Filter *.test.js -File |
            Sort-Object FullName |
            ForEach-Object { $_.FullName }

          if ($testFiles.Count -eq 0) {
            throw "No automated test files were found."
          }

          & node --test @testFiles *>&1 | Tee-Object validation/tests.log
          if ($LASTEXITCODE -ne 0) {
            throw "Tests failed with exit code $LASTEXITCODE."
          }

          $text = Get-Content validation/tests.log -Raw
          $tests = [regex]::Match($text, '(?m)^# tests\s+(\d+)\s*$')
          $passed = [regex]::Match($text, '(?m)^# pass\s+(\d+)\s*$')
          $failed = [regex]::Match($text, '(?m)^# fail\s+(\d+)\s*$')
          if (-not $tests.Success -or -not $passed.Success -or -not $failed.Success) {
            throw "Could not prove the Node test totals from TAP output."
          }
          if ([int]$tests.Groups[1].Value -lt 141 -or
              [int]$passed.Groups[1].Value -ne [int]$tests.Groups[1].Value -or
              [int]$failed.Groups[1].Value -ne 0) {
            throw "Expected at least 141 passing tests and zero failures."
          }

      - name: Build Windows NSIS and portable executables
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $builder = Join-Path $PWD "node_modules\electron-builder\cli.js"
          node $builder --win nsis portable *>&1 |
            Tee-Object validation/windows-build.log
          if ($LASTEXITCODE -ne 0) {
            throw "Windows packaging failed with exit code $LASTEXITCODE."
          }

      - name: Validate PE metadata, install, launch, association, and uninstall
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & ./scripts/windows-release-validation.ps1 *>&1 |
            Tee-Object validation/windows-validation.log
          if ($LASTEXITCODE -ne 0) {
            throw "Windows release validation failed with exit code $LASTEXITCODE."
          }

      - name: Detect distributables
        if: always()
        id: distributables
        shell: pwsh
        run: |
          $installer = Test-Path "release/Airmonlink-Composer-1.1.0-Build14-Setup.exe" -PathType Leaf
          $portable = Test-Path "release/Airmonlink-Composer-1.1.0-Build14-Portable.exe" -PathType Leaf
          $checksums = Test-Path "release/SHA256SUMS.txt" -PathType Leaf
          "present=$($installer -and $portable -and $checksums)".ToLowerInvariant() |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Windows distributables
        if: ${{ always() && steps.distributables.outputs.present == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Airmonlink-Composer-1.1.0-Build14-Windows
          path: |
            release/Airmonlink-Composer-1.1.0-Build14-Setup.exe
            release/Airmonlink-Composer-1.1.0-Build14-Portable.exe
            release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Airmonlink-Composer-1.1.0-Build14-Windows-Validation
          path: validation/**
          if-no-files-found: warn
          retention-days: 30
